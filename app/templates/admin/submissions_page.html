<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Админка - Решения</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.5.2/flowbite.min.js"></script>
    <style>
      body {
        font-family: "Manrope", sans-serif;
      }
    </style>
  </head>
  <body class="min-h-screen bg-slate-100 text-slate-900">
    {% include "admin/_nav.html" %}

    <main class="mx-auto max-w-7xl px-4 py-6 sm:py-8">
      <nav aria-label="Breadcrumb" class="mb-4">
        <ol class="flex items-center gap-2 text-xs font-semibold text-slate-500">
          <li><span>Админка</span></li>
          <li aria-hidden="true">/</li>
          <li><span class="text-slate-800">Решения</span></li>
        </ol>
      </nav>

      <section class="rounded-3xl bg-gradient-to-r from-teal-700 via-cyan-700 to-sky-700 p-6 text-white shadow-lg">
        <p class="text-xs uppercase tracking-[0.22em] text-cyan-100">Панель админа</p>
        <h1 class="mt-2 text-2xl font-extrabold sm:text-3xl">Решения кандидатов</h1>
        <p class="mt-2 text-sm text-cyan-50">Фильтруйте, сортируйте и открывайте детальный разбор каждой отправки.</p>
      </section>

      <section class="mt-6 rounded-2xl border border-slate-200 bg-white p-4 shadow-sm">
        <form
          id="admin-filters"
          method="get"
          action="/admin/submissions"
          class="grid gap-3 md:grid-cols-6"
        >
          <div>
            <label for="status" class="mb-1 block text-xs font-semibold uppercase tracking-wide text-slate-500">Статус</label>
            <select id="status" name="status" class="w-full rounded-lg border border-slate-300 p-2 text-sm">
              <option value="" {% if not status %}selected{% endif %}>Любой</option>
              {% for option in ['uploaded','normalization_in_progress','normalized','evaluation_in_progress','evaluated','delivery_in_progress','delivered','failed_normalization','failed_evaluation','failed_delivery','dead_letter'] %}
              <option value="{{ option }}" {% if status == option %}selected{% endif %}>{{ option }}</option>
              {% endfor %}
            </select>
          </div>
          <div>
            <label for="candidate_query" class="mb-1 block text-xs font-semibold uppercase tracking-wide text-slate-500">Кандидат</label>
            <input id="candidate_query" name="candidate_query" value="{{ candidate_query }}" class="w-full rounded-lg border border-slate-300 p-2 text-sm" placeholder="Имя или фамилия" />
          </div>
          <div>
            <label for="assignment_query" class="mb-1 block text-xs font-semibold uppercase tracking-wide text-slate-500">Задача</label>
            <input id="assignment_query" name="assignment_query" list="assignment-title-options" value="{{ assignment_query }}" class="w-full rounded-lg border border-slate-300 p-2 text-sm" placeholder="Название задачи" />
            <datalist id="assignment-title-options">
              {% for assignment in assignments_for_autocomplete %}
              <option value="{{ assignment.title }}"></option>
              {% endfor %}
            </datalist>
          </div>
          <div>
            <label for="sort_by" class="mb-1 block text-xs font-semibold uppercase tracking-wide text-slate-500">Сортировать по</label>
            <select id="sort_by" name="sort_by" class="w-full rounded-lg border border-slate-300 p-2 text-sm">
              <option value="created_at" {% if sort_by == 'created_at' %}selected{% endif %}>created_at</option>
              <option value="updated_at" {% if sort_by == 'updated_at' %}selected{% endif %}>updated_at</option>
              <option value="score_1_10" {% if sort_by == 'score_1_10' %}selected{% endif %}>score_1_10</option>
              <option value="status" {% if sort_by == 'status' %}selected{% endif %}>status</option>
            </select>
          </div>
          <div>
            <label for="score_min" class="mb-1 block text-xs font-semibold uppercase tracking-wide text-slate-500">Оценка от</label>
            <input id="score_min" name="score_min" type="number" min="1" max="10" value="{{ score_min }}" class="w-full rounded-lg border border-slate-300 p-2 text-sm" placeholder="1" />
          </div>
          <div>
            <label for="score_max" class="mb-1 block text-xs font-semibold uppercase tracking-wide text-slate-500">Оценка до</label>
            <input id="score_max" name="score_max" type="number" min="1" max="10" value="{{ score_max }}" class="w-full rounded-lg border border-slate-300 p-2 text-sm" placeholder="10" />
          </div>
          <div>
            <label for="sort_order" class="mb-1 block text-xs font-semibold uppercase tracking-wide text-slate-500">Порядок</label>
            <select id="sort_order" name="sort_order" class="w-full rounded-lg border border-slate-300 p-2 text-sm">
              <option value="desc" {% if sort_order == 'desc' %}selected{% endif %}>desc</option>
              <option value="asc" {% if sort_order == 'asc' %}selected{% endif %}>asc</option>
            </select>
          </div>
          <div class="flex items-end gap-2">
            <button type="submit" class="rounded-lg bg-sky-700 px-4 py-2 text-sm font-semibold text-white hover:bg-sky-800">Применить</button>
            <input type="hidden" name="limit" value="{{ limit }}" />
            <input type="hidden" name="offset" value="{{ offset }}" />
          </div>
        </form>

        <div class="mt-4 flex items-center gap-2">
          <button
            class="rounded-lg bg-emerald-700 px-4 py-2 text-sm font-semibold text-white hover:bg-emerald-800"
            hx-post="/admin/submissions/export"
            hx-include="#admin-filters"
            hx-target="#admin-export-result"
            hx-swap="innerHTML"
          >
            Экспорт CSV
          </button>
          <div id="admin-export-result" class="text-sm text-slate-600"></div>
        </div>
      </section>

      <section class="mt-6 rounded-2xl border border-slate-200 bg-white p-2 shadow-sm sm:p-4">
        <div id="admin-submissions-table">
          {% include "admin/submissions_table.html" %}
        </div>
      </section>

      <div class="mt-4 flex items-center justify-between text-sm">
        <a
          class="rounded-lg border border-slate-300 bg-white px-3 py-2 font-semibold text-slate-700 {% if not has_prev %}pointer-events-none opacity-40{% endif %}"
          href="/admin/submissions?status={{ status }}&candidate_query={{ candidate_query }}&assignment_query={{ assignment_query }}&score_min={{ score_min }}&score_max={{ score_max }}&sort_by={{ sort_by }}&sort_order={{ sort_order }}&limit={{ limit }}&offset={{ offset - limit if has_prev else 0 }}"
        >
          Назад
        </a>
        <a
          class="rounded-lg border border-slate-300 bg-white px-3 py-2 font-semibold text-slate-700 {% if not has_next %}pointer-events-none opacity-40{% endif %}"
          href="/admin/submissions?status={{ status }}&candidate_query={{ candidate_query }}&assignment_query={{ assignment_query }}&score_min={{ score_min }}&score_max={{ score_max }}&sort_by={{ sort_by }}&sort_order={{ sort_order }}&limit={{ limit }}&offset={{ offset + limit }}"
        >
          Вперед
        </a>
      </div>
    </main>
  </body>
</html>
