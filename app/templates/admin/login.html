<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Админка - Вход</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        font-family: "Manrope", sans-serif;
      }
    </style>
  </head>
  <body class="min-h-screen bg-slate-100 text-slate-900">
    <main class="mx-auto flex min-h-screen max-w-md items-center px-4 py-8">
      <section class="w-full rounded-3xl border border-slate-200 bg-white p-6 shadow-sm">
        <p class="text-xs uppercase tracking-[0.2em] text-slate-500">Панель админа</p>
        <h1 class="mt-2 text-2xl font-extrabold">Вход</h1>
        <p class="mt-2 text-sm text-slate-600">Фиктивная форма входа для локальной навигации.</p>

        {% if error_message %}
        <div class="mt-4 rounded-xl border border-rose-300 bg-rose-50 px-4 py-3 text-sm text-rose-800">{{ error_message }}</div>
        {% endif %}

        <form method="post" action="/admin/login" class="mt-5 space-y-4">
          <div>
            <label for="username" class="mb-1 block text-sm font-medium text-slate-700">Логин</label>
            <input
              id="username"
              name="username"
              value="{{ username_value }}"
              required
              class="block w-full rounded-lg border border-slate-300 p-2.5 text-sm"
              placeholder="admin"
            />
          </div>

          <div>
            <label for="password" class="mb-1 block text-sm font-medium text-slate-700">Пароль</label>
            <input
              id="password"
              name="password"
              type="password"
              required
              class="block w-full rounded-lg border border-slate-300 p-2.5 text-sm"
              placeholder="password"
            />
          </div>

          <button type="submit" class="inline-flex w-full items-center justify-center rounded-lg bg-slate-900 px-5 py-2.5 text-sm font-semibold text-white hover:bg-slate-700">
            Войти
          </button>
        </form>
      </section>
    </main>
  </body>
</html>
