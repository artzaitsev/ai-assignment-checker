<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Подача работы по заданию</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-900">
    <main class="mx-auto max-w-4xl px-4 py-8 sm:py-12">
      <section class="rounded-2xl bg-gradient-to-r from-sky-700 to-cyan-600 p-6 text-white shadow-lg">
        <p class="text-xs uppercase tracking-[0.2em] text-cyan-100">Портал кандидата</p>
        <h1 class="mt-2 text-2xl font-extrabold sm:text-3xl">Отправка решения</h1>
        <p class="mt-2 text-sm text-cyan-50">Вы загружаете решение для конкретного задания.</p>
      </section>

      <section class="mt-6 rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
        <p class="text-xs uppercase tracking-wide text-slate-500">Задача</p>
        <h2 class="mt-1 text-xl font-bold">{{ assignment.title }}</h2>
        <p class="mt-2 text-sm text-slate-700">{{ assignment.description }}</p>
        <a
          href="{{ template_download_url }}"
          class="mt-4 inline-flex items-center rounded-lg bg-slate-900 px-4 py-2 text-sm font-semibold text-white hover:bg-slate-700"
        >
          Скачать шаблон задания (.docx)
        </a>
      </section>

      <section class="mt-6 rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
        <div id="fixed-apply-content">
          <form
            class="space-y-4"
            hx-post="/candidate/assignments/{{ assignment.assignment_public_id }}/submit"
            hx-target="#fixed-apply-content"
            hx-swap="innerHTML"
            hx-encoding="multipart/form-data"
          >
            <div class="grid gap-4 sm:grid-cols-2">
              <div>
                <label for="first_name" class="mb-1 block text-sm font-medium text-slate-700">Имя</label>
                <input id="first_name" name="first_name" required class="block w-full rounded-lg border border-slate-300 p-2.5 text-sm" />
              </div>
              <div>
                <label for="last_name" class="mb-1 block text-sm font-medium text-slate-700">Фамилия</label>
                <input id="last_name" name="last_name" required class="block w-full rounded-lg border border-slate-300 p-2.5 text-sm" />
              </div>
            </div>

            <div>
              <label for="file" class="mb-1 block text-sm font-medium text-slate-700">Файл с решением</label>
              <input id="file" name="file" type="file" required class="block w-full rounded-lg border border-slate-300 bg-slate-50 p-2 text-sm" />
            </div>

            <button type="submit" class="inline-flex items-center rounded-lg bg-sky-600 px-5 py-2.5 text-sm font-semibold text-white hover:bg-sky-700">
              Отправить работу
            </button>
          </form>
        </div>
      </section>
    </main>
  </body>
</html>
