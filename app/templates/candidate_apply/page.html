<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Подача работы</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.5.2/flowbite.min.js"></script>
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-900">
    <main class="mx-auto max-w-4xl px-4 py-8 sm:py-12">
      <section class="mb-6 rounded-2xl bg-gradient-to-r from-sky-600 to-cyan-500 p-6 text-white shadow-lg">
        <p class="text-xs uppercase tracking-widest text-cyan-100">AI Assignment Checker</p>
        <h1 class="mt-2 text-2xl font-bold sm:text-3xl">Завершите отправку Вашей работы</h1>
        <p class="mt-2 text-sm text-cyan-50">Эта защищенная страница связана с Вашим Telegram-чатом для отправки результата.</p>
      </section>

      {% if error_message %}
      <section class="rounded-xl border border-rose-300 bg-rose-50 p-4 text-rose-700">
        <h2 class="font-semibold">Ссылка недействительна</h2>
        <p class="mt-1 text-sm">{{ error_message }}</p>
      </section>
      {% else %}
      <section class="rounded-2xl border border-slate-200 bg-white p-5 shadow-sm">
        <div class="mb-4 flex items-center gap-2 text-sm text-slate-600">
          <span class="inline-flex h-2.5 w-2.5 rounded-full bg-emerald-500"></span>
          Сессия активна. Пожалуйста, загрузите файл с Вашим решением.
        </div>
        <div
          id="candidate-apply-content"
          hx-get="/candidate/apply/form"
          hx-trigger="load"
          hx-swap="innerHTML"
          class="space-y-3"
        >
          <div class="h-4 w-1/2 animate-pulse rounded bg-slate-100"></div>
          <div class="h-28 animate-pulse rounded bg-slate-100"></div>
          <div class="h-10 w-40 animate-pulse rounded bg-slate-100"></div>
        </div>
      </section>
      {% endif %}
    </main>
  </body>
</html>
