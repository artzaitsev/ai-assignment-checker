<div class="rounded-xl border p-4 {% if success %}border-emerald-300 bg-emerald-50 text-emerald-800{% else %}border-rose-300 bg-rose-50 text-rose-700{% endif %}">
  <h3 class="text-base font-semibold">{{ title }}</h3>
  <p class="mt-1 text-sm">{{ message }}</p>
  {% if submission_id %}
  <p class="mt-3 text-xs" data-submission-id="{{ submission_id }}">
    ID отправки: <span class="font-mono">{{ submission_id }}</span>
  </p>
  {% endif %}
</div>
