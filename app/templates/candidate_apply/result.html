<div class="space-y-4">
  <div class="rounded-2xl border p-4 {% if success %}border-emerald-300 bg-emerald-50 text-emerald-800{% else %}border-rose-300 bg-rose-50 text-rose-700{% endif %}">
    <h3 class="text-base font-semibold">{{ title }}</h3>
    <p class="mt-1 text-sm">{{ message }}</p>
    {% if submission_id %}
    <p class="mt-3 text-xs" data-submission-id="{{ submission_id }}">
      ID отправки: <span class="font-mono">{{ submission_id }}</span>
    </p>
    <a
      class="mt-3 inline-flex items-center rounded-lg bg-slate-900 px-4 py-2 text-xs font-semibold text-white hover:bg-slate-700"
      href="/candidate/apply/result/{{ submission_id }}"
    >
      Открыть страницу результата
    </a>
    {% endif %}
  </div>

  {% if success and submission_id %}
  <div
    id="candidate-result-panel"
    hx-get="/candidate/apply/result/{{ submission_id }}/panel"
    hx-trigger="load, every 2s"
    hx-swap="outerHTML"
  >
    <div class="h-24 animate-pulse rounded-2xl bg-slate-100"></div>
  </div>
  {% endif %}
</div>
