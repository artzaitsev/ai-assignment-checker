<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Результат проверки</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/htmx.org@1.9.12"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/flowbite/2.5.2/flowbite.min.js"></script>
    <style>
      body {
        font-family: "Manrope", sans-serif;
      }
    </style>
  </head>
  <body class="min-h-screen bg-slate-50 text-slate-900">
    <main class="mx-auto max-w-4xl px-4 py-10 sm:py-14">
      <section class="rounded-3xl border border-slate-200 bg-gradient-to-r from-sky-700 to-cyan-600 p-6 text-white shadow-lg sm:p-8">
        <p class="text-xs uppercase tracking-[0.22em] text-cyan-100">Портал кандидата</p>
        <h1 class="mt-2 text-2xl font-extrabold sm:text-3xl">Результат проверки</h1>
        <p class="mt-2 text-sm text-cyan-50">Страница обновляется автоматически, пока проверка не завершится.</p>
      </section>

      <section class="mt-6">
        <div
          id="candidate-result-panel"
          hx-get="/candidate/apply/result/{{ submission_id }}/panel"
          hx-trigger="load, every 2s"
          hx-swap="outerHTML"
        >
          <div class="h-24 animate-pulse rounded-2xl bg-slate-100"></div>
        </div>
      </section>
    </main>
  </body>
</html>
