spec_version: chain-spec:v1
chain_version: chain:v1

runtime:
  temperature: 0.1
  seed: 42

rubric:
  ai_assistance_policy:
    enabled: true
    affects_score: false
    require_fields:
      - likelihood
      - confidence
      - disclaimer

prompts:
  system: |
    Вы выступаете в роли проверяющего.
    Возвращайте строго валидный JSON-объект по схеме ниже.
    Не добавляйте markdown, пояснения, префиксы, суффиксы или кодовые блоки.
    Корневой объект обязательно содержит: tasks, organizer_feedback, candidate_feedback, ai_assistance.
  user_template: |
    Язык ответа: {{assignment.language}}

    Требования к формату ответа (обязательно):
    1) Вернуть ОДИН JSON-объект без markdown/код-блоков.
    2) Для КАЖДОЙ задачи из task_schema вернуть объект в tasks.
    3) Для КАЖДОГО критерия в задаче вернуть criterion_id, целочисленный score (1..10), reason (непустая строка).
    4) criterion_id и task_id должны точно совпадать со значениями из task_schema.
    5) Если не хватает данных, ставьте низкий/средний score и явно объясняйте в reason.
    6) Не оставляйте reason пустым: reason должен содержать 1-2 конкретных предложения.
    7) Не пропускайте ключи: каждый объект критерия всегда имеет ВСЕ три поля: criterion_id, score, reason.
    8) Не переименовывайте поля (например, нельзя id/rationale/value вместо criterion_id/reason/score).
    9) Формируйте tasks строго как 1:1 проекцию assignment.task_schema.tasks.

    Требования к качеству обратной связи:
    - reason по каждому критерию должен ссылаться на факты из ответа кандидата (по task_solutions, submission_text или unmapped_text).
    - organizer_feedback.strengths/issues/recommendations: по 2-4 содержательных пункта без общих фраз.
    - candidate_feedback.summary: 2-4 предложения, коротко и по делу, с приоритетом самых важных улучшений.
    - candidate_feedback.what_went_well / what_to_improve: по 2-4 конкретных пункта.
    - Избегайте шаблонов вроде "в целом неплохо" без фактов.
    - Если работа пустая, почти пустая или не по теме задания: выставляйте низкие оценки (обычно 1..3), не придумывайте сильные стороны, явно укажите отсутствие релевантного решения.

    Структура JSON-ответа:
    {
      "tasks": [
        {
          "task_id": "<из task_schema>",
          "criteria": [
            {
              "criterion_id": "<из task_schema>",
              "score": 1,
              "reason": "краткое обоснование"
            }
          ]
        }
      ],
      "organizer_feedback": {
        "strengths": ["..."],
        "issues": ["..."],
        "recommendations": ["..."]
      },
      "candidate_feedback": {
        "summary": "...",
        "what_went_well": ["..."],
        "what_to_improve": ["..."]
      },
      "ai_assistance": {
        "likelihood": 0.0,
        "confidence": 0.0,
        "disclaimer": "..."
      }
    }

    Название задания:
    {{assignment.title}}

    Описание задания:
    {{assignment.description}}

    Содержимое работы:
    {{normalized.submission_text}}

    Извлеченные ответы по задачам (primary):
    {{normalized.task_solutions}}

    Неразобранные фрагменты (fallback):
    {{normalized.unmapped_text}}

    Дополнительный fallback-контекст:
    {{normalized.fallback_context}}

    Task schema:
    {{assignment.task_schema}}

    AI assistance policy:
    {{rubric.ai_assistance_policy}}

llm_response:
  type: json
  required:
    - tasks
    - organizer_feedback
    - candidate_feedback
    - ai_assistance
  properties:
    tasks:
      type: array
      items:
        type: object
        required: [task_id, criteria]
        properties:
          task_id: { type: string }
          criteria:
            type: array
            items:
              type: object
              required: [criterion_id, score, reason]
              properties:
                criterion_id: { type: string }
                score: { type: integer, minimum: 1, maximum: 10 }
                reason: { type: string }
    organizer_feedback:
      type: object
      required: [strengths, issues, recommendations]
      properties:
        strengths: { type: array, items: { type: string } }
        issues: { type: array, items: { type: string } }
        recommendations: { type: array, items: { type: string } }
    candidate_feedback:
      type: object
      required: [summary, what_went_well, what_to_improve]
      properties:
        summary: { type: string }
        what_went_well: { type: array, items: { type: string } }
        what_to_improve: { type: array, items: { type: string } }
    ai_assistance:
      type: object
      required: [likelihood, confidence, disclaimer]
      properties:
        likelihood: { type: number, minimum: 0, maximum: 1 }
        confidence: { type: number, minimum: 0, maximum: 1 }
        disclaimer: { type: string }
